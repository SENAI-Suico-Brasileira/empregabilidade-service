services:
  - type: web
    name: empregabilidade-service
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: npx prisma migrate deploy && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: https://empregabilidade-web.vercel.app
