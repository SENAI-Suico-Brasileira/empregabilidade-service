# ─────────────────────────────────────────────────────────────────────────────
# NGINX — Portal de Empregabilidade SENAI
#
# Copiar para: /etc/nginx/sites-available/empregabilidade
# Ativar com:  ln -sf /etc/nginx/sites-available/empregabilidade \
#                      /etc/nginx/sites-enabled/empregabilidade
# Testar com:  nginx -t
# Recarregar:  systemctl reload nginx
#
# Para HTTPS (recomendado após apontar o domínio):
#   certbot --nginx -d seu-dominio.com -d www.seu-dominio.com
# ─────────────────────────────────────────────────────────────────────────────

# Rate limiting — protege o /api de abuso
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

server {
    listen 80;
    listen [::]:80;

    # Substituir pelo domínio real ou IP público do servidor
    server_name _;

    # Arquivos estáticos do build do React (Vite)
    root /var/www/empregabilidade/web;
    index index.html;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        image/svg+xml font/woff font/woff2;

    # ── Segurança (headers básicos) ───────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Assets com hash (Vite gera nomes como /assets/index-Abc123.js) ───────
    # Cache longo — os nomes mudam a cada build, então nunca servem versão velha
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Arquivos raiz sem hash (favicon, robots.txt etc.) ────────────────────
    location ~* \.(ico|txt|xml|webmanifest)$ {
        expires    7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location = /health {
        proxy_pass         http://127.0.0.1:3001;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ── API — reverse proxy para o Node.js (PM2) ─────────────────────────────
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass             http://127.0.0.1:3001;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade           $http_upgrade;
        proxy_set_header       Connection        "upgrade";
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_cache_bypass     $http_upgrade;
        proxy_read_timeout     60s;
        proxy_connect_timeout  10s;

        # Não cachear respostas da API
        add_header Cache-Control "no-store";
    }

    # ── SPA fallback — React Router (client-side routing) ────────────────────
    # Qualquer rota que não seja arquivo físico cai no index.html
    location / {
        try_files $uri $uri/ /index.html;

        # index.html nunca deve ser cacheado pelo browser (referencia assets com hash)
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            expires 0;
        }
    }
}
