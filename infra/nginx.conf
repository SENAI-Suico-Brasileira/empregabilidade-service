##
## Nginx — Portal de Empregabilidade SENAI
##
## Arquivo: /etc/nginx/sites-available/empregabilidade
## Ativar: ln -s /etc/nginx/sites-available/empregabilidade /etc/nginx/sites-enabled/
##
## Fluxo:
##   /* → serve o build React (SPA fallback para index.html)
##   /api/* → proxy para Node.js em localhost:3001 (nunca exposto externamente)
##

server {
    listen 80;
    server_name _;   # substitua pelo domínio ou IP público quando houver

    # Build do frontend React
    root /var/www/empregabilidade-web/dist;
    index index.html;

    # SPA — todas as rotas desconhecidas servem index.html (React Router cuida do resto)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy para a API Node.js — tráfego nunca sai do servidor
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts generosos para operações de banco
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }

    # Segurança básica — esconde versão do Nginx
    server_tokens off;

    # Compressão para assets do frontend
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
